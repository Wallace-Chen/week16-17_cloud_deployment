services:
  financial-mlops-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: financial-mlops-api:latest
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - 'import json, urllib.request; r = urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=3); assert json.load(r)["status"] == "ok"'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
